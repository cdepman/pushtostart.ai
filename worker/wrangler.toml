name = "shipartifact-sites"
main = "src/index.ts"
compatibility_date = "2024-12-01"

routes = [
  { pattern = "*.shipartifact.com/*", zone_name = "shipartifact.com" }
]

[[r2_buckets]]
binding = "SITE_BUCKET"
bucket_name = "shipartifact-sites"

[[unsafe.bindings]]
name = "AI_RATE_LIMITER"
type = "ratelimit"
namespace_id = "0"
simple = { limit = 10, period = 60 }
